# 易宿酒店预订平台 - Nginx 示例配置
# 使用前请替换：你的域名或IP、/var/www/hotel-booking 为实际路径
# 放入 /etc/nginx/sites-available/ 后执行：
#   sudo ln -s /etc/nginx/sites-available/nginx-hotel-booking.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 你的域名或IP;   # 例如 www.example.com 或 47.96.xxx.xxx

    root /var/www/hotel-booking/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}
