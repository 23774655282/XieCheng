<html lang="en">

    <link rel="preconnect" href="https://webapi.amap.com">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
